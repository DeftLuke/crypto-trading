# Production stack — runs 24/7 on Kali OR cloud VPS (no Windows PC, no Tailscale)
# Kali:  bash scripts/kali-deploy.sh
# VPS:   cd deploy && docker compose --profile tunnel up -d --build

name: crypto-trading

services:
  backend:
    profiles: ["legacy"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://host.docker.internal:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_VIA_GATEWAY: "true"
      RESEARCH_API_URL: ${RESEARCH_API_URL:-http://research-api:8100}
      FREQTRADE_ENABLED: "false"
      WALLET_SCANNER_DATA_DIR: /app/data/smart-wallets
    volumes:
      - ../data/smart-wallets:/app/data/smart-wallets:rw
      - ./keys:/app/keys:ro
    networks:
      - trading

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://api.deftluke.online}
        VITE_WS_URL: ${PUBLIC_WS_URL:-wss://api.deftluke.online}
        VITE_APP_URL: ${PUBLIC_APP_URL:-https://trade.deftluke.online}
        VITE_PLATFORM_URL: ${PUBLIC_PLATFORM_URL:-https://terminal.deftluke.online}
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
    restart: always
    ports:
      - "127.0.0.1:5173:80"
    networks:
      - trading

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - research_redis_data:/data
    networks:
      - trading

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - research_qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - trading

  research-api:
    build:
      context: ../research-platform
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8100
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DATA_ROOT: /app/data
      MEMORY_EMBEDDING_PROVIDER: ${MEMORY_EMBEDDING_PROVIDER:-hash}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      CONTROL_AUTO_TRADING: ${CONTROL_AUTO_TRADING:-false}
      CONTROL_MANUAL_APPROVAL: ${CONTROL_MANUAL_APPROVAL:-true}
      CONTROL_TRADING_MODE: ${CONTROL_TRADING_MODE:-demo}
      TRADE_APPROVAL_PASSCODE: ${TRADE_APPROVAL_PASSCODE:-8888}
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ../research-platform/data:/app/data
    depends_on:
      - redis
      - qdrant
    networks:
      - trading

  analytics-dashboard:
    build:
      context: ..
      dockerfile: ${ANALYTICS_DOCKERFILE:-deploy/Dockerfile.analytics-dashboard}
      args:
        NEXT_PUBLIC_RESEARCH_API_URL: ${NEXT_PUBLIC_RESEARCH_API_URL:-/api/research}
        NEXT_PUBLIC_TRADING_API_URL: ${NEXT_PUBLIC_TRADING_API_URL:-https://api.deftluke.online/api}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-wss://api.deftluke.online/ws}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_PUBLISHABLE_KEY}
        TRADING_API_URL: http://host.docker.internal:3002
        RESEARCH_API_URL: http://research-api:8100
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      RESEARCH_API_URL: ${RESEARCH_API_URL:-http://research-api:8100}
      TRADING_API_URL: http://host.docker.internal:3002
      NEXT_PUBLIC_RESEARCH_API_URL: ${NEXT_PUBLIC_RESEARCH_API_URL:-/api/research}
      NEXT_PUBLIC_TRADING_API_URL: ${NEXT_PUBLIC_TRADING_API_URL:-https://api.deftluke.online/api}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - research-api
    networks:
      - trading

  telegram-signal-service:
    profiles: ["telegram-ingestion"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.telegram-signal-service
    restart: always
    env_file: .env
    environment:
      MAIN_TRADING_API_URL: http://host.docker.internal:3002/api
      TELEGRAM_SESSION_NAME: /app/data/kali_user_session
      TELEGRAM_SERVICE_CONFIG: /app/config.json
      SIGNAL_STORE_PATH: /app/data/signals.jsonl
      AI_PARSER_ENABLED: "true"
      AI_PARSER_URL: ${AI_PARSER_URL:-http://host.docker.internal:8080/chat}
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://host.docker.internal:8080}
      AI_PARSER_API_KEY: ${AI_API_KEY:-}
      AI_PARSER_MODEL: ${AI_PARSER_MODEL:-qwen2.5:7b-instruct}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-llava:7b}
    volumes:
      - ../telegram-signal-service/config.json:/app/config.json:ro
      - ../telegram-signal-service/data:/app/data:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - trading

  n8n:
    profiles: ["full-stack"]
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.deftluke.online}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_BASE_URL:-https://n8n.deftluke.online}/
      WEBHOOK_URL: ${N8N_BASE_URL:-https://n8n.deftluke.online}/
      N8N_SECURE_COOKIE: "true"
      N8N_PROXY_HOPS: "1"
      NODE_ENV: production
      GENERIC_TIMEZONE: ${TZ:-Asia/Dhaka}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - trading

  ollama:
    profiles: ["full-stack"]
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - trading

  ollama-init:
    profiles: ["full-stack"]
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling AI models (first run may take several minutes)..."
        ollama pull ${OLLAMA_MODEL:-mistral:7b} || true
        ollama pull ${OLLAMA_FALLBACK_MODEL:-mistral:7b} || true
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text} || true
        echo "Models ready."
    networks:
      - trading

  ai-gateway:
    profiles: ["full-stack"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ai-gateway
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AI_GATEWAY_PORT: 8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      OLLAMA_FALLBACK: ${OLLAMA_FALLBACK_MODEL:-mistral:7b}
      AI_API_KEY: ${AI_API_KEY}
      BACKEND_URL: http://host.docker.internal:3002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - trading

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - analytics-dashboard
      - research-api
      - n8n
      - ai-gateway
    networks:
      - trading

  freqtrade:
    profiles: ["freqtrade"]
    image: freqtradeorg/freqtrade:stable
    restart: always
    ports:
      - "127.0.0.1:8081:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ../freqtrade/user_data:/freqtrade/user_data
    env_file: .env
    environment:
      FREQTRADE__DRY_RUN: ${FREQTRADE_DRY_RUN:-true}
      FREQTRADE__STRATEGY: ${FREQTRADE_STRATEGY:-TradeGPT_RSI_Momentum}
      FREQTRADE__EXCHANGE__KEY: ${BINANCE_API_KEY}
      FREQTRADE__EXCHANGE__SECRET: ${BINANCE_API_SECRET}
      FREQTRADE__API_SERVER__ENABLED: "true"
      FREQTRADE__API_SERVER__LISTEN_IP_ADDRESS: "0.0.0.0"
      FREQTRADE__API_SERVER__LISTEN_PORT: "8080"
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE_API_USER:-freqtrader}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE_API_PASSWORD:-changeme}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE_JWT_SECRET:-change-me-jwt}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy-path /freqtrade/user_data/strategies
    networks:
      - trading

networks:
  trading:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
  research_redis_data:
  research_qdrant_data:
