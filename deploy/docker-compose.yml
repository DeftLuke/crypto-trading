# Production stack — runs 24/7 on Kali OR cloud VPS (no Windows PC, no Tailscale)
# Kali:  bash scripts/kali-deploy.sh
# VPS:   cd deploy && docker compose --profile tunnel up -d --build

name: crypto-trading

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://host.docker.internal:8080}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_VIA_GATEWAY: "true"
    networks:
      - trading

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-https://api.deftluke.online}
        VITE_WS_URL: ${PUBLIC_WS_URL:-wss://api.deftluke.online}
        VITE_APP_URL: ${PUBLIC_APP_URL:-https://trade.deftluke.online}
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
    restart: always
    ports:
      - "127.0.0.1:5173:80"
    networks:
      - trading

  n8n:
    profiles: ["full-stack"]
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.deftluke.online}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_BASE_URL:-https://n8n.deftluke.online}/
      WEBHOOK_URL: ${N8N_BASE_URL:-https://n8n.deftluke.online}/
      N8N_SECURE_COOKIE: "true"
      N8N_PROXY_HOPS: "1"
      NODE_ENV: production
      GENERIC_TIMEZONE: ${TZ:-Asia/Dhaka}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - trading

  ollama:
    profiles: ["full-stack"]
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - trading

  ollama-init:
    profiles: ["full-stack"]
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling AI models (first run may take several minutes)..."
        ollama pull ${OLLAMA_MODEL:-mistral:7b} || true
        ollama pull ${OLLAMA_FALLBACK_MODEL:-mistral:7b} || true
        ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text} || true
        echo "Models ready."
    networks:
      - trading

  ai-gateway:
    profiles: ["full-stack"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ai-gateway
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AI_GATEWAY_PORT: 8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      OLLAMA_FALLBACK: ${OLLAMA_FALLBACK_MODEL:-mistral:7b}
      AI_API_KEY: ${AI_API_KEY}
      BACKEND_URL: http://backend:3001
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - trading

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
      - frontend
      - n8n
      - ai-gateway
    networks:
      - trading

networks:
  trading:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
