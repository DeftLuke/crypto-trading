services:
  postgres:
    profiles: ["local"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research_db
    ports:
      - "5433:5432"
    volumes:
      - research_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - research_redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - research_qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  research-api:
    build: .
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DATA_ROOT: /app/data
      MEMORY_EMBEDDING_PROVIDER: hash
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started

volumes:
  research_pg_data:
  research_redis_data:
  research_qdrant_data:
